{% extends "base.html" %}

{% block content %}

<h1 class="page-title">

    Manage

    <span class="text-gradient">
        Faculty
    </span>

</h1>

<div class="glass-panel"
    style="margin-top:24px;">

    <form method="POST"
        action="/add-faculty">

        <input
            type="text"
            name="name"
            placeholder="Faculty Name"
            required
            class="form-input">

        <button class="btn-primary">

            Add Faculty

        </button>

    </form>

</div>

<div class="glass-panel"
    style="margin-top:24px;">

    <table class="analytics-table">

        <thead>

            <tr>

                <th>ID</th>
                <th>Name</th>

            </tr>

        </thead>

        <tbody>

            {% for f in faculty %}

            <tr>

                <td>{{ f.id }}</td>
                <td>{{ f.name }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
