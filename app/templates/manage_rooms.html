{% extends "base.html" %}

{% block content %}

<h1 class="page-title">

    Manage

    <span class="text-gradient">
        Rooms
    </span>

</h1>

<div class="glass-panel"
    style="margin-top:24px;">

    <form method="POST"
        action="/add-room">

        <input
            type="text"
            name="name"
            placeholder="Room Name"
            required
            class="form-input">

        <input
            type="number"
            name="capacity"
            placeholder="Capacity"
            required
            class="form-input">

        <button class="btn-primary">

            Add Room

        </button>

    </form>

</div>

<div class="glass-panel"
    style="margin-top:24px;">

    <table class="analytics-table">

        <thead>

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Capacity</th>

            </tr>

        </thead>

        <tbody>

            {% for r in rooms %}

            <tr>

                <td>{{ r.id }}</td>
                <td>{{ r.name }}</td>
                <td>{{ r.capacity }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
